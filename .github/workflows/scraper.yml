name: FT Scraper

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: |
          python actualizar_valores.py
      
      - name: Wake up Streamlit
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -L --max-redirs 5 \
            --connect-timeout 10 \
            --max-time 30 \
            -A "Mozilla/5.0" \
            https://inversiona.streamlit.app/
