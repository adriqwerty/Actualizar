name: FT Scraper

on:
  schedule:
    # 🟢 LUNES A SABADO - 07:00 (España) = 05:00 UTC
    - cron: "0 5 * * 1-6"

    # 🟢 LUNES A VIERNES cada 2h (09:00 a 21:00 España)
    - cron: "0 7 * * 1-5"
    - cron: "0 9 * * 1-5"
    - cron: "0 12 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "0 19 * * 1-5"
  workflow_dispatch:      # ejecución manual

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: |
          python actualizar_valores.py
